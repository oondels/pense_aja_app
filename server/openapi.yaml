openapi: 3.0.3
info:
  title: Pense Aja Backend API
  version: 1.0.0
  description: >
    API backend do Pense Aja para cadastro e avaliação de ideias, pontuação,
    marketplace de recompensas, perfil de usuário, RBAC, dashboards e apoio de IA.
servers:
  - url: http://localhost:2512
    description: Desenvolvimento local
tags:
  - name: Pense Aja
    description: Ideias, avaliação, compatibilidade de loja legada e catálogo.
  - name: Marketplace
    description: Catálogo operacional, solicitação de resgate, aprovação com desconto de pontos, rejeição e estorno.
  - name: User
    description: Perfil do colaborador, preferências, unidade, histórico de pontos e contexto de sessão.
  - name: RBAC
    description: Administração manual de vínculos usuário/unidade/papel.
  - name: Dashboard
    description: Métricas agregadas por unidade Dass.
  - name: AI
    description: Ferramentas auxiliares de IA para melhorar textos de ideias.
security:
  - cookieAuth: []

paths:
  /:
    get:
      tags: [Pense Aja]
      summary: Healthcheck textual da API
      description: >
        Retorna uma mensagem simples indicando que a API está disponível.
        Acesso público, sem autenticação.
      security: []
      responses:
        "200":
          description: API disponível.
          content:
            text/plain:
              schema:
                type: string
              example: Pense Aja API
        "500":
          $ref: "#/components/responses/InternalServerError"

  /pense-aja/products/{dassOffice}:
    get:
      tags: [Pense Aja]
      summary: Listar produtos da loja por unidade
      description: >
        Lista os itens ativos do catálogo operacional da unidade Dass informada.
        A rota é pública no código atual e não exige token.
      security: []
      parameters:
        - $ref: "#/components/parameters/DassOfficePath"
      responses:
        "200":
          description: Produtos encontrados.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LegacyProduct"
              example:
                - id: "6f60f952-ea22-49b9-a1dd-f346f42f38f2"
                  nome: "Garrafa térmica"
                  imagem: "https://cdn.exemplo.com/garrafa.png"
                  valor: 150
        "400":
          $ref: "#/components/responses/LegacyValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      tags: [Pense Aja]
      summary: Atualizar produtos em lote
      description: >
        Atualiza parcialmente produtos do catálogo da unidade. Exige usuário
        autenticado com permissão dinâmica `catalog.manage` para a unidade.
      parameters:
        - $ref: "#/components/parameters/DassOfficePath"
        - $ref: "#/components/parameters/CookieHeader"
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/ProductUpdateInput"
            example:
              - id: "6f60f952-ea22-49b9-a1dd-f346f42f38f2"
                nome: "Garrafa térmica Dass"
                valor: 180
      responses:
        "200":
          description: Produtos atualizados.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductUpdateResponse"
              example:
                message: "Produto atualizado com sucesso!"
                data:
                  updated: 1
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /pense-aja/purchase/{registration}:
    put:
      tags: [Pense Aja]
      summary: Resgatar produto pelo fluxo legado compatível
      description: >
        Mantém compatibilidade com o endpoint antigo de compra, mas registra o
        resgate no marketplace operacional e no ledger. Exige token válido e
        permissão `reward.legacy.redeem` na unidade enviada no payload.
      parameters:
        - $ref: "#/components/parameters/RegistrationPath"
        - $ref: "#/components/parameters/CookieHeader"
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseProductPayload"
            example:
              product:
                id: "6f60f952-ea22-49b9-a1dd-f346f42f38f2"
              colaboradorData:
                matricula: 1234567
                nome: "Maria Souza"
              analista:
                analistaUser: "7654321"
                analistaName: "João Analista"
              dassOffice: "SEST"
      responses:
        "200":
          description: Resgate registrado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseProductResponse"
              example:
                message: "Produto resgatado com sucesso!"
                data: 927
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /pense-aja/{dassOffice}:
    get:
      tags: [Pense Aja]
      summary: Listar ideias por unidade
      description: >
        Lista ideias não excluídas da unidade, com filtros opcionais e pontuação
        calculada a partir do ledger. Acesso público no código atual.
      security: []
      parameters:
        - $ref: "#/components/parameters/DassOfficePath"
        - $ref: "#/components/parameters/StartDateQuery"
        - $ref: "#/components/parameters/EndDateQuery"
        - name: name
          in: query
          required: false
          schema:
            type: string
          description: Filtro parcial por nome do colaborador.
        - name: sector
          in: query
          required: false
          schema:
            type: string
          description: Filtro por setor.
        - name: manager
          in: query
          required: false
          schema:
            type: string
          description: Filtro por gerente.
        - name: project
          in: query
          required: false
          schema:
            type: string
          description: Filtro por nome do projeto.
        - name: turno
          in: query
          required: false
          schema:
            type: string
          description: Filtro por turno.
        - name: status
          in: query
          required: false
          schema:
            type: string
          description: Filtro por status operacional.
      responses:
        "200":
          description: Ideias encontradas.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PenseAjaListItem"
              example:
                - id: 101
                  criado: "2026-04-20T12:00:00.000Z"
                  matricula: 1234567
                  fabrica: "SEST"
                  nome: "Maria Souza"
                  setor: "Costura"
                  gerente: "Ana Gerente"
                  nome_projeto: "Redução de retrabalho"
                  turno: "A"
                  situacao_anterior: "Retrabalho recorrente na linha."
                  situacao_atual: "Checklist visual implantado."
                  ganhos: ["Qualidade", "Produtividade"]
                  outros_ganhos: null
                  gerente_aprovador: "Ana Gerente"
                  analista_avaliador: "João Analista"
                  status_gerente: "aprovado"
                  status_analista: "concluido"
                  em_espera: false
                  createdat: "2026-04-20T12:00:00.000Z"
                  classificacao: "A"
                  pontuacao: 100
        "400":
          $ref: "#/components/responses/LegacyValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags: [Pense Aja]
      summary: Criar ideia
      description: >
        Cadastra uma nova ideia na unidade Dass. A rota é pública e não exige
        autenticação. O backend valida unidade, payload, colaborador e
        duplicidade, além de gerar auditoria e notificação ao gerente quando
        aplicável.
      parameters:
        - $ref: "#/components/parameters/DassOfficePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePenseAjaPayload"
            example:
              nome: "Redução de retrabalho"
              createDate: "2026-04-20T12:00:00.000Z"
              situationBefore: "A linha registrava retrabalho diário por falta de identificação."
              situationNow: "Foi criado um checklist visual no posto de trabalho."
              registration: 1234567
              perdas: ["retrabalho", "espera"]
              userName: "Maria Souza"
              gerente: "Ana Gerente"
              setor: "Costura"
              turno: "A"
              ganhos: ["Qualidade", "Produtividade"]
              areaMelhoria: "Qualidade"
              factory: "SEST"
      responses:
        "201":
          description: Ideia criada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePenseAjaResponse"
              example:
                message: "Pense e Aja cadastrado com sucesso!"
                id: 101
        "400":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /pense-aja/{dassOffice}/{id}:
    get:
      tags: [Pense Aja]
      summary: Consultar detalhe de ideia
      description: >
        Retorna os dados completos de uma ideia por unidade e identificador.
        Acesso público no código atual.
      security: []
      parameters:
        - $ref: "#/components/parameters/DassOfficePath"
        - $ref: "#/components/parameters/IdeaIdPath"
      responses:
        "200":
          description: Detalhe da ideia.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PenseAjaDetails"
              example:
                matricula: 1234567
                nome: "Maria Souza"
                setor: "Costura"
                turno: "A"
                gerente: "Ana Gerente"
                criado: "2026-04-20T12:00:00.000Z"
                situacao_anterior: "Retrabalho recorrente na linha."
                situacao_atual: "Checklist visual implantado."
                nome_projeto: "Redução de retrabalho"
                super_producao: 0
                transporte: 0
                processamento: 0
                movimento: 0
                estoque: 0
                espera: 1
                talento: 0
                retrabalho: 1
                gerente_aprovador: "Ana Gerente"
                data_aprogerente: "2026-04-21T12:00:00.000Z"
                analista_avaliador: "João Analista"
                classificacao: "A"
                a3_mae: null
                fabrica: "SEST"
                ganhos: ["Qualidade", "Produtividade"]
                justificativa_analista: "Ideia implementada e validada."
                outros_ganhos: null
        "400":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /pense-aja/{dassOffice}/{id}/audit:
    get:
      tags: [Pense Aja]
      summary: Consultar trilha de auditoria de uma ideia
      description: >
        Lista eventos de auditoria associados à ideia na unidade. Acesso público
        no código atual.
      security: []
      parameters:
        - $ref: "#/components/parameters/DassOfficePath"
        - $ref: "#/components/parameters/IdeaIdPath"
      responses:
        "200":
          description: Eventos de auditoria encontrados.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEvent"
              example:
                - id: 55
                  eventType: "idea.created"
                  aggregateType: "idea"
                  aggregateId: "101"
                  dassOffice: "SEST"
                  actorRegistration: "1234567"
                  actorName: "Maria Souza"
                  actorRole: "colaborador"
                  reason: "Cadastro de nova ideia."
                  createdAt: "2026-04-20T12:00:00.000Z"
                  metadata:
                    source: "pense_aja"
        "400":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /pense-aja/avaliar/{id}:
    put:
      tags: [Pense Aja]
      summary: Avaliar ideia
      description: >
        Avalia ou reavalia uma ideia, podendo gerar pontuação, reversão,
        reprovação, exclusão ou espera. Exige token válido e permissão
        `idea.evaluate` na unidade informada no payload.
      parameters:
        - $ref: "#/components/parameters/IdeaIdPath"
        - $ref: "#/components/parameters/CookieHeader"
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluateIdeaPayload"
            example:
              dassOffice: "SEST"
              status: "approve"
              classification: "A"
              bonusPoints: 2
              bonusJustification: "Ganho adicional comprovado na avaliação."
              emEspera: false
              replicavel: true
              justificativa: "Ideia implementada com ganho de qualidade comprovado."
              avaliadoAnteriormente: false
              a3Mae: null
      responses:
        "200":
          description: Ideia avaliada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluatePenseAjaResponse"
              example:
                message: "Pense e Aja avaliado com sucesso!"
                data:
                  id: 101
                  data_realizada: "2026-04-22T12:00:00.000Z"
                  fabrica: "SEST"
                  nome: "Maria Souza"
                  matricula: 1234567
                  setor: "Costura"
                  gerente: "Ana Gerente"
                  nome_projeto: "Redução de retrabalho"
                  turno: "A"
                  situacao_anterior: "Retrabalho recorrente na linha."
                  situacao_atual: "Checklist visual implantado."
                  gerente_aprovador: "Ana Gerente"
                  analista_avaliador: "João Analista"
                  status_gerente: "aprovado"
                  status_analista: "concluido"
                  em_espera: false
                  criado: "2026-04-20T12:00:00.000Z"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /marketplace/catalog/{dassOffice}:
    get:
      tags: [Marketplace]
      summary: Listar catálogo operacional
      description: >
        Lista itens do catálogo operacional da unidade Dass. Acesso público no
        código atual.
      security: []
      parameters:
        - $ref: "#/components/parameters/DassOfficePath"
      responses:
        "200":
          description: Catálogo encontrado.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketplaceCatalogItem"
              example:
                - id: "6f60f952-ea22-49b9-a1dd-f346f42f38f2"
                  legacyProductId: "12"
                  dassOffice: "SEST"
                  name: "Garrafa térmica"
                  imageUrl: "https://cdn.exemplo.com/garrafa.png"
                  pointsCost: 150
                  itemType: "physical"
                  active: true
                  availableQuantity: null
                  metadata:
                    source: "pense_aja_loja"
        "400":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      tags: [Marketplace]
      summary: Criar ou atualizar itens de catálogo
      description: >
        Cria ou atualiza itens do catálogo operacional. Exige token válido e
        permissão `catalog.manage` na unidade.
      parameters:
        - $ref: "#/components/parameters/DassOfficePath"
        - $ref: "#/components/parameters/CookieHeader"
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/UpsertCatalogItemInput"
            example:
              - id: "6f60f952-ea22-49b9-a1dd-f346f42f38f2"
                name: "Garrafa térmica Dass"
                imageUrl: "https://cdn.exemplo.com/garrafa.png"
                pointsCost: 180
                itemType: "physical"
                active: true
                availableQuantity: 25
                metadata:
                  supplier: "almoxarifado"
      responses:
        "200":
          description: Catálogo atualizado.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketplaceCatalogItem"
              example:
                - id: "6f60f952-ea22-49b9-a1dd-f346f42f38f2"
                  legacyProductId: "12"
                  dassOffice: "SEST"
                  name: "Garrafa térmica Dass"
                  imageUrl: "https://cdn.exemplo.com/garrafa.png"
                  pointsCost: 180
                  itemType: "physical"
                  active: true
                  availableQuantity: 25
                  metadata:
                    supplier: "almoxarifado"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /marketplace/requests:
    post:
      tags: [Marketplace]
      summary: Solicitar resgate no marketplace
      description: >
        Cria solicitação de resgate, reserva pontos no ledger e deixa a
        solicitação em `pending_approval`. Exige token válido; qualquer usuário
        autenticado pode solicitar resgate para a própria matrícula.
      parameters:
        - $ref: "#/components/parameters/CookieHeader"
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMarketplaceRequestInput"
            example:
              dassOffice: "SEST"
              catalogItemId: "6f60f952-ea22-49b9-a1dd-f346f42f38f2"
              reason: "Resgate de premiação por pontos acumulados."
      responses:
        "201":
          description: Solicitação criada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceRequest"
              example:
                id: 927
                registration: "1234567"
                dassOffice: "SEST"
                catalogItemId: "6f60f952-ea22-49b9-a1dd-f346f42f38f2"
                requestStatus: "pending_approval"
                reservedLedgerEntryId: 451
                approvalActorRegistration: null
                approvalActorName: null
                fulfillmentType: "none"
                legacyPrizeId: null
                createdAt: "2026-04-22T12:00:00.000Z"
                updatedAt: "2026-04-22T12:00:00.000Z"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
    get:
      tags: [Marketplace]
      summary: Listar solicitações de marketplace
      description: >
        Lista solicitações da unidade para operação de aprovação/fulfillment.
        Exige token válido e permissão `marketplace.request.approve`.
      parameters:
        - $ref: "#/components/parameters/DassOfficeQueryRequired"
        - $ref: "#/components/parameters/CookieHeader"
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Solicitações encontradas.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketplaceRequest"
              example:
                - id: 927
                  registration: "1234567"
                  dassOffice: "SEST"
                  catalogItemId: "6f60f952-ea22-49b9-a1dd-f346f42f38f2"
                  requestStatus: "pending_approval"
                  reservedLedgerEntryId: 451
                  approvalActorRegistration: null
                  approvalActorName: null
                  fulfillmentType: "none"
                  legacyPrizeId: null
                  createdAt: "2026-04-22T12:00:00.000Z"
                  updatedAt: "2026-04-22T12:00:00.000Z"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /marketplace/requests/{id}/approve:
    put:
      tags: [Marketplace]
      summary: Aprovar solicitação de resgate
      description: >
        Aprova uma solicitação pendente, confirma o consumo dos pontos com
        lançamento `commit` e finaliza o resgate como `completed`. Não gera
        voucher ou fulfillment. Exige token válido e permissão
        `marketplace.request.approve` na unidade enviada no payload.
      parameters:
        - $ref: "#/components/parameters/RequestIdPath"
        - $ref: "#/components/parameters/CookieHeader"
      security:
        - cookieAuth: []
      requestBody:
        $ref: "#/components/requestBodies/MarketplaceTransition"
      responses:
        "200":
          $ref: "#/components/responses/MarketplaceRequestApproved"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /marketplace/requests/{id}/reject:
    put:
      tags: [Marketplace]
      summary: Rejeitar solicitação de resgate
      description: >
        Rejeita uma solicitação e libera pontos reservados quando existir reserva.
        Exige token válido e permissão `marketplace.request.approve`.
      parameters:
        - $ref: "#/components/parameters/RequestIdPath"
        - $ref: "#/components/parameters/CookieHeader"
      security:
        - cookieAuth: []
      requestBody:
        $ref: "#/components/requestBodies/MarketplaceTransition"
      responses:
        "200":
          $ref: "#/components/responses/MarketplaceRequestRejected"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /marketplace/requests/{id}/refund:
    put:
      tags: [Marketplace]
      summary: Estornar solicitação concluída
      description: >
        Estorna uma solicitação concluída com lançamento `refund` no ledger.
        Exige token válido e permissão `marketplace.request.approve` ou
        `marketplace.refund`.
      parameters:
        - $ref: "#/components/parameters/RequestIdPath"
        - $ref: "#/components/parameters/CookieHeader"
      security:
        - cookieAuth: []
      requestBody:
        $ref: "#/components/requestBodies/MarketplaceTransition"
      responses:
        "200":
          $ref: "#/components/responses/MarketplaceRequestRefunded"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /unit-settings/{dassOffice}:
    get:
      tags: [Unit Settings]
      summary: Obter configurações da unidade
      description: Retorna regras editáveis de pontuação, workflow e marketplace da unidade.
      parameters:
        - $ref: "#/components/parameters/DassOfficePath"
        - $ref: "#/components/parameters/CookieHeader"
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Configuração da unidade.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnitSettings"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    put:
      tags: [Unit Settings]
      summary: Atualizar configurações da unidade
      description: Atualiza pontuação, workflow e política de marketplace em transação.
      parameters:
        - $ref: "#/components/parameters/DassOfficePath"
        - $ref: "#/components/parameters/CookieHeader"
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnitSettingsUpdate"
      responses:
        "200":
          description: Configuração atualizada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnitSettings"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /user/session-context/{dassOffice}:
    get:
      tags: [User]
      summary: Obter contexto de sessão por unidade
      description: >
        Resolve permissões e papéis efetivos agregados de todos os papéis
        ativos do usuário autenticado na unidade, sem snapshot persistido.
        Exige token válido.
      parameters:
        - $ref: "#/components/parameters/DassOfficePath"
        - $ref: "#/components/parameters/CookieHeader"
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Contexto de sessão resolvido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionContext"
              example:
                registration: "1234567"
                dassOffice: "SEST"
                permissions:
                  - "catalog.manage"
                  - "marketplace.request.approve"
                roles:
                  - code: "marketplace_admin"
                    nome: "Administrador do marketplace"
                    dassOffice: "SEST"
                  - code: "marketplace_operator"
                    nome: "Operador do marketplace"
                    dassOffice: "SEST"
                unitConfig:
                  dassOffice: "SEST"
                  active: true
                  scoringRules:
                    - classification: "A"
                      label: "A"
                      description: "Avançada"
                      score: 4
                      displayOrder: 1
                      active: true
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /user/rbac/roles:
    get:
      tags: [RBAC]
      summary: Listar papéis RBAC
      description: >
        Lista apenas papéis disponíveis no escopo administrativo do ator
        autenticado. Exige token válido.
      parameters:
        - $ref: "#/components/parameters/CookieHeader"
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Papéis encontrados.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RbacRole"
              example:
                - id: 1
                  code: "admin_master"
                  nome: "Administrador Master"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /user/rbac/assignments:
    get:
      tags: [RBAC]
      summary: Listar vínculos RBAC
      description: >
        Lista vínculos usuário/unidade/papel dentro do escopo administrativo do
        ator autenticado, com filtros opcionais. Exige token válido.
      parameters:
        - $ref: "#/components/parameters/DassOfficeQueryOptional"
        - name: registration
          in: query
          required: false
          schema:
            type: string
          description: Matrícula para filtro.
        - name: active
          in: query
          required: false
          schema:
            type: string
            enum: ["true", "false"]
          description: Filtra vínculos ativos ou inativos.
        - name: roleCode
          in: query
          required: false
          schema:
            type: string
          description: Código do papel para filtro.
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Busca livre por matrícula, unidade, código ou nome do papel.
        - $ref: "#/components/parameters/CookieHeader"
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Vínculos encontrados.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RbacAssignment"
              example:
                - id: 10
                  registration: "1234567"
                  dassOffice: "SEST"
                  roleId: 1
                  roleCode: "admin_master"
                  roleName: "Administrador Master"
                  active: true
                  activeFrom: null
                  activeUntil: null
                  createdAt: "2026-04-22T12:00:00.000Z"
                  updatedAt: "2026-04-22T12:00:00.000Z"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags: [RBAC]
      summary: Criar vínculo RBAC
      description: >
        Cria um ou mais vínculos usuário/unidade/papel dentro do escopo
        administrativo do ator. Exige token válido.
      parameters:
        - $ref: "#/components/parameters/CookieHeader"
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRbacAssignmentInput"
            example:
              registration: "1234567"
              dassOffice: "SEST"
              roleCodes: ["idea_submitter", "marketplace_operator"]
              active: true
              activeFrom: "2026-04-22T12:00:00.000Z"
              activeUntil: null
      responses:
        "201":
          description: Vínculos criados ou já existentes.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RbacAssignment"
              example:
                - id: 11
                  registration: "1234567"
                  dassOffice: "SEST"
                  roleId: 2
                  roleCode: "idea_submitter"
                  roleName: "Colaborador que cadastra ideias"
                  active: true
                  activeFrom: "2026-04-22T12:00:00.000Z"
                  activeUntil: null
                  createdAt: "2026-04-22T12:00:00.000Z"
                  updatedAt: "2026-04-22T12:00:00.000Z"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /user/rbac/assignments/{id}:
    get:
      tags: [RBAC]
      summary: Consultar vínculo RBAC
      description: >
        Retorna um vínculo RBAC por identificador quando o vínculo está no
        escopo administrativo do ator. Exige token válido.
      parameters:
        - $ref: "#/components/parameters/AssignmentIdPath"
        - $ref: "#/components/parameters/CookieHeader"
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Vínculo encontrado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RbacAssignment"
              example:
                id: 11
                registration: "1234567"
                dassOffice: "SEST"
                roleId: 2
                roleCode: "idea_reviewer"
                roleName: "Avaliador de ideias"
                active: true
                activeFrom: "2026-04-22T12:00:00.000Z"
                activeUntil: null
                createdAt: "2026-04-22T12:00:00.000Z"
                updatedAt: "2026-04-22T12:00:00.000Z"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      tags: [RBAC]
      summary: Atualizar vínculo RBAC
      description: >
        Atualiza vigência ou status de vínculos dentro do escopo
        administrativo do ator. Aceita roleCode para compatibilidade com
        atualização de um vínculo único e roleCodes para adicionar ou atualizar
        múltiplos papéis da mesma matrícula/unidade identificada pelo vínculo
        informado, sem remover papéis omitidos. Exige token válido.
      parameters:
        - $ref: "#/components/parameters/AssignmentIdPath"
        - $ref: "#/components/parameters/CookieHeader"
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRbacAssignmentInput"
            example:
              roleCodes: ["idea_admin", "marketplace_operator"]
              active: true
              activeFrom: "2026-04-22T12:00:00.000Z"
              activeUntil: null
      responses:
        "200":
          description: Vínculo atualizado ou vínculos afetados quando roleCodes é enviado.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/RbacAssignment"
                  - type: array
                    items:
                      $ref: "#/components/schemas/RbacAssignment"
              example:
                - id: 11
                  registration: "1234567"
                  dassOffice: "SEST"
                  roleId: 3
                  roleCode: "idea_admin"
                  roleName: "Administrador de avaliação"
                  active: true
                  activeFrom: "2026-04-22T12:00:00.000Z"
                  activeUntil: null
                  createdAt: "2026-04-22T12:00:00.000Z"
                  updatedAt: "2026-04-23T12:00:00.000Z"
                - id: 12
                  registration: "1234567"
                  dassOffice: "SEST"
                  roleId: 6
                  roleCode: "marketplace_operator"
                  roleName: "Operador de loja"
                  active: true
                  activeFrom: "2026-04-22T12:00:00.000Z"
                  activeUntil: null
                  createdAt: "2026-04-23T12:00:00.000Z"
                  updatedAt: "2026-04-23T12:00:00.000Z"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      tags: [RBAC]
      summary: Remover vínculo RBAC
      description: >
        Remove vínculo RBAC dentro do escopo administrativo do ator. Exige
        token válido.
      parameters:
        - $ref: "#/components/parameters/AssignmentIdPath"
        - $ref: "#/components/parameters/CookieHeader"
      security:
        - cookieAuth: []
      responses:
        "204":
          description: Vínculo removido sem corpo de resposta.
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /user/{registration}:
    get:
      tags: [User]
      summary: Consultar perfil do colaborador
      description: >
        Retorna dados básicos, classificações, saldo, pontos resgatados, email e
        preferências. Acesso público no código atual, mas exige `dassOffice` em query.
      security: []
      parameters:
        - $ref: "#/components/parameters/RegistrationPath"
        - $ref: "#/components/parameters/DassOfficeQueryRequired"
      responses:
        "200":
          description: Perfil encontrado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
              example:
                nome: "Maria Souza"
                setor: "Costura"
                gerente: "Ana Gerente"
                funcao: "colaborador"
                matricula: 1234567
                pontos: 320
                pontos_resgatados: 150
                pontos_reservados: 0
                pontos_estornados: 0
                saldo_disponivel: 170
                classificacoes_pense_aja:
                  A: 2
                  B: 1
                email: "maria.souza@grupodass.com.br"
                authorized_notifications_apps: ["pense_aja"]
        "400":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      tags: [User]
      summary: Atualizar perfil do colaborador
      description: >
        Atualiza email e preferências de notificação do colaborador. Exige token
        válido.
      parameters:
        - $ref: "#/components/parameters/RegistrationPath"
        - $ref: "#/components/parameters/CookieHeader"
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserPayload"
            example:
              dassOffice: "SEST"
              formData:
                email: "maria.souza@grupodass.com.br"
                authorized_notifications_apps: ["pense_aja"]
      responses:
        "200":
          description: Perfil atualizado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
              example:
                nome: "Maria Souza"
                setor: "Costura"
                gerente: "Ana Gerente"
                funcao: "colaborador"
                matricula: 1234567
                pontos: 320
                pontos_resgatados: 150
                saldo_disponivel: 170
                classificacoes_pense_aja:
                  A: 2
                  B: 1
                email: "maria.souza@grupodass.com.br"
                authorized_notifications_apps: ["pense_aja"]
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /user/{registration}/points-history:
    get:
      tags: [User]
      summary: Consultar histórico de pontos
      description: >
        Retorna o histórico append-only do ledger para a matrícula e unidade.
        Exige token válido. A matrícula autenticada pode consultar o próprio
        histórico; consulta de terceiros exige permissão operacional.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/RegistrationPath"
        - $ref: "#/components/parameters/DassOfficeQueryRequired"
      responses:
        "200":
          description: Histórico encontrado.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LedgerEntry"
              example:
                - id: 451
                  registration: "1234567"
                  dassOffice: "SEST"
                  entryType: "earn"
                  amount: 100
                  sourceType: "idea_evaluation"
                  sourceId: "101"
                  status: "confirmed"
                  createdAt: "2026-04-22T12:00:00.000Z"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /user/{registration}/points-adjustments:
    post:
      tags: [User]
      summary: Registrar ajuste manual de pontuação
      description: >
        Cria um lançamento append-only para corrigir saldo de pontuação por
        matrícula e unidade. Exige token válido e permissão `points.adjust`.
        Débitos não podem deixar saldo disponível negativo.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/RegistrationPath"
        - $ref: "#/components/parameters/CookieHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePointsAdjustmentPayload"
            example:
              dassOffice: "SEST"
              direction: "credit"
              amount: 2
              reason: "Correção auditada de saldo."
      responses:
        "201":
          description: Ajuste registrado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PointsAdjustmentResponse"
              example:
                id: 901
                registration: "1234567"
                dassOffice: "SEST"
                direction: "credit"
                amount: 2
                reason: "Correção auditada de saldo."
                availableBalance: 12
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /user/unidade/{registration}:
    get:
      tags: [User]
      summary: Resolver unidade do colaborador
      description: >
        Consulta a unidade Dass associada à matrícula em `core.unidades_dass`.
        Acesso público no código atual.
      security: []
      parameters:
        - $ref: "#/components/parameters/RegistrationPath"
      responses:
        "200":
          description: Unidade resolvida.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserOfficeResponse"
              example:
                dassOffice: "SEST"
                message: "Matrícula validada, unidade: SEST"
        "400":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /dashboard/summary/{dassOffice}:
    get:
      tags: [Dashboard]
      summary: Obter resumo do dashboard
      description: >
        Retorna métricas consolidadas da unidade, incluindo ideias, valores,
        ledger e marketplace. Ideias implementadas são ideias fora de espera
        com aprovação de analista ou gerente. Acesso público no código atual.
      security: []
      parameters:
        - $ref: "#/components/parameters/DassOfficePath"
        - $ref: "#/components/parameters/StartDateQuery"
        - $ref: "#/components/parameters/EndDateQuery"
      responses:
        "200":
          description: Resumo calculado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummaryEnvelope"
              example:
                erro: false
                dados:
                  totalIdeas: 120
                  implementedIdeas: 80
                  pendingIdeas: 20
                  rejectedIdeas: 5
                  approvedByManager: 95
                  inAnalysis: 15
                  totalValue: 25000
                  avgValue: 208.33
                  totalPointsEarned: 10500
                  totalPointsRedeemed: 3800
                  totalPointsReserved: 600
                  marketplacePending: 4
                  marketplaceCompleted: 30
        "400":
          $ref: "#/components/responses/DashboardValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /dashboard/monthly/{dassOffice}:
    get:
      tags: [Dashboard]
      summary: Obter série mensal do dashboard
      description: >
        Retorna quantidade e valor agregado de ideias por mês para a unidade.
        A métrica mensal de aprovadas usa a regra de ideias implementadas:
        fora de espera e com aprovação de analista ou gerente. Acesso público
        no código atual.
      security: []
      parameters:
        - $ref: "#/components/parameters/DassOfficePath"
        - $ref: "#/components/parameters/StartDateQuery"
        - $ref: "#/components/parameters/EndDateQuery"
      responses:
        "200":
          description: Série mensal calculada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardMonthlyEnvelope"
              example:
                erro: false
                dados:
                  - month: "2026-04"
                    count: 12
                    value: 4200
        "400":
          $ref: "#/components/responses/DashboardValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /dashboard/dimensional/{dassOffice}:
    get:
      tags: [Dashboard]
      summary: Obter métricas dimensionais
      description: >
        Retorna distribuição de ideias por gerente, setor e fábrica. Acesso
        público no código atual.
      security: []
      parameters:
        - $ref: "#/components/parameters/DassOfficePath"
        - $ref: "#/components/parameters/StartDateQuery"
        - $ref: "#/components/parameters/EndDateQuery"
      responses:
        "200":
          description: Dimensões calculadas.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardDimensionalEnvelope"
              example:
                erro: false
                dados:
                  manager:
                    - label: "Ana Gerente"
                      count: 35
                  sector:
                    - label: "Costura"
                      count: 48
                  factory:
                    - label: "SEST"
                      count: 120
        "400":
          $ref: "#/components/responses/DashboardValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /dashboard/idea-highlights/{dassOffice}:
    get:
      tags: [Dashboard]
      summary: Obter ideias em destaque
      description: >
        Retorna ideias destacadas para exibição no dashboard. Acesso público no
        código atual. O status `Aprovada` segue a regra de ideias
        implementadas: fora de espera e com aprovação de analista ou gerente.
      security: []
      parameters:
        - $ref: "#/components/parameters/DassOfficePath"
        - $ref: "#/components/parameters/StartDateQuery"
        - $ref: "#/components/parameters/EndDateQuery"
      responses:
        "200":
          description: Destaques encontrados.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardHighlightsEnvelope"
              example:
                erro: false
                dados:
                  - id: 101
                    title: "Redução de retrabalho"
                    description: "Checklist visual implantado na linha."
                    author: "Maria Souza"
                    avatarColor: "#2563eb"
                    date: "2026-04-20"
                    status: "concluido"
                    category: "Qualidade"
                    sector: "Costura"
                    factory: "SEST"
                    likes: 0
                    comments: 0
                    syntheticEngagement: false
        "400":
          $ref: "#/components/responses/DashboardValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /dashboard/engagement/{dassOffice}:
    get:
      tags: [Dashboard]
      summary: Obter engajamento de colaboradores
      description: >
        Retorna ranking de colaboradores por participação e implementação de
        ideias. Implementadas são ideias fora de espera com aprovação de
        analista ou gerente. Acesso público no código atual.
      security: []
      parameters:
        - $ref: "#/components/parameters/DassOfficePath"
        - $ref: "#/components/parameters/StartDateQuery"
        - $ref: "#/components/parameters/EndDateQuery"
      responses:
        "200":
          description: Engajamento calculado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardEngagementEnvelope"
              example:
                erro: false
                dados:
                  - id: 1234567
                    name: "Maria Souza"
                    role: "colaborador"
                    department: "Costura"
                    ideas: 6
                    implemented: 4
                    avatarColor: "#2563eb"
        "400":
          $ref: "#/components/responses/DashboardValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /ai/improve-text:
    post:
      tags: [AI]
      summary: Melhorar texto de uma ideia
      description: >
        Usa IA para reescrever os textos de situação anterior e atual de uma
        ideia. Acesso público no código atual; não participa de autorização,
        pontuação ou mudança formal de status.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImproveTextRequest"
            example:
              projectName: "Redução de retrabalho"
              situationBefore: "Tinha muito retrabalho porque a peça era enviada errada."
              situationNow: "Foi colocado uma identificação visual para evitar envio errado."
      responses:
        "200":
          description: Texto melhorado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImproveTextResponse"
              example:
                result:
                  before: "O processo apresentava retrabalho recorrente devido ao envio incorreto de peças."
                  after: "Foi implantada identificação visual para reduzir erros de envio e aumentar a qualidade."
        "400":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: token
      description: Token JWT de sessão enviado no cookie `token`.

  parameters:
    CookieHeader:
      name: Cookie
      in: header
      required: true
      schema:
        type: string
      description: Cookie de autenticação contendo `token=<jwt>`.
      example: "token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
    DassOfficePath:
      name: dassOffice
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/DassOffice"
      description: Unidade Dass da operação.
      example: "SEST"
    DassOfficeQueryRequired:
