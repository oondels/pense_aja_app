      description: Unidade Dass usada para escopo de autorização/filtro.
      example: "SEST"
    RegistrationPath:
      name: registration
      in: path
      required: true
      schema:
        type: string
        minLength: 7
      description: Matrícula do colaborador.
      example: "1234567"
    IdeaIdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Identificador da ideia.
      example: 101
    RequestIdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Identificador da solicitação de marketplace.
      example: 927
    AssignmentIdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Identificador do vínculo RBAC.
      example: 11
    StartDateQuery:
      name: startDate
      in: query
      required: false
      schema:
        type: string
        format: date-time
      description: Data inicial do filtro.
      example: "2026-04-01T00:00:00.000Z"
    EndDateQuery:
      name: endDate
      in: query
      required: false
      schema:
        type: string
        format: date-time
      description: Data final do filtro.
      example: "2026-04-30T23:59:59.999Z"

  requestBodies:
    MarketplaceTransition:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MarketplaceTransitionInput"
