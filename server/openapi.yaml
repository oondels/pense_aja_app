            dassOffice: "SEST"
            reason: "Solicitação validada pela liderança."
            notes: "Sem pendências operacionais."
            metadata:
              channel: "admin_panel"

  responses:
    ValidationError:
      description: Erro de validação de entrada.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorMessage"
          example:
            message: "Dados inválidos. Unidade Dass inválida!"
    LegacyValidationError:
      description: Erro de validação em formato legado.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/LegacyError"
          example:
            erro: true
            mensagem: "O campo 'dassOffice' é obrigatório."
            dados: "Não há registros!"
    DashboardValidationError:
      description: Erro de validação de filtros do dashboard.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DashboardError"
          example:
            erro: true
            mensagem: "Data de início inválida."
    Unauthorized:
      description: Usuário não autenticado ou token ausente/inválido.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorMessage"
          example:
            message: "Usuário não autenticado."
    Forbidden:
      description: Usuário autenticado sem permissão para a operação.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorMessage"
          example:
            message: "Acesso negado. Permissão insuficiente."
    InternalServerError:
      description: Erro interno tratado pelo middleware global.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorMessage"
          example:
            message: "Erro interno no servidor. - Contate a equipe de automação!"
    MarketplaceRequestApproved:
      description: Solicitação aprovada e concluída com desconto de pontos.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MarketplaceRequest"
          example:
            id: 927
            registration: "1234567"
            dassOffice: "SEST"
            catalogItemId: "6f60f952-ea22-49b9-a1dd-f346f42f38f2"
            requestStatus: "completed"
            reservedLedgerEntryId: 451
            approvalActorRegistration: "7654321"
            approvalActorName: "João Analista"
            fulfillmentType: "none"
            legacyPrizeId: null
            createdAt: "2026-04-22T12:00:00.000Z"
            updatedAt: "2026-04-22T13:00:00.000Z"
    MarketplaceRequestRejected:
      description: Solicitação rejeitada.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MarketplaceRequest"
          example:
            id: 927
            registration: "1234567"
            dassOffice: "SEST"
            catalogItemId: "6f60f952-ea22-49b9-a1dd-f346f42f38f2"
            requestStatus: "rejected"
            reservedLedgerEntryId: null
            approvalActorRegistration: "7654321"
            approvalActorName: "João Analista"
