    DashboardEngagementEnvelope:
      allOf:
        - $ref: "#/components/schemas/DashboardEnvelope"
        - type: object
          properties:
            dados:
              type: array
              items:
                $ref: "#/components/schemas/DashboardEngagementContributor"
    DashboardEngagementContributor:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: string
        department:
          type: string
        ideas:
          type: integer
        implemented:
          type: integer
        avatarColor:
          type: string
    ImproveTextRequest:
      type: object
      required: [projectName, situationBefore, situationNow]
      properties:
        projectName:
          type: string
        situationBefore:
          type: string
        situationNow:
          type: string
    ImproveTextResponse:
      type: object
      properties:
        result:
          type: object
          properties:
            before:
              type: string
            after:
              type: string
